site_name: python-faker-jsonschema
site_description: Generate fake data matching a JSON schema with Faker.
site_url: https://anentropic.github.io/python-faker-jsonschema/
repo_url: https://github.com/anentropic/python-faker-jsonschema
repo_name: anentropic/python-faker-jsonschema
edit_uri: edit/main/docs/src/
docs_dir: docs/src

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Reference:
    - Strings: reference/strings.md
    - Numbers & Integers: reference/numbers.md
    - Arrays: reference/arrays.md
    - Objects: reference/objects.md
    - Boolean & Null: reference/boolean-null.md
    - Compound Keywords: reference/compound.md
    - Special Keywords: reference/special.md
