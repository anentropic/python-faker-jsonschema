name: Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Install prek
        run: uv tool install prek

      - name: Run quality gates
        run: prek run --all-files

      - name: Tests
        run: uv run pytest -q

      - name: Cache pruning
        if: always()
        run: uv cache prune --ci

  fuzz:
    name: Multi-seed fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        seed: [1, 42, 12345, 314159, 9999999]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Fuzz tests (seed=${{ matrix.seed }})
        env:
          SEED: ${{ matrix.seed }}
          REPEATS_SLOW: 50
          REPEATS_FAST: 200
        run: uv run pytest -q

      - name: Cache pruning
        if: always()
        run: uv cache prune --ci
