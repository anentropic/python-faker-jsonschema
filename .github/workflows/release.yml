name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Build wheel and sdist
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  validate:
    name: Validate distributions
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Test wheel installation
        run: |
          uv venv --python ${{ matrix.python-version }} test-env-wheel
          uv pip install --python test-env-wheel/bin/python dist/*.whl
          test-env-wheel/bin/python -c "import faker_jsonschema; print('Wheel installation OK')"

      - name: Test sdist installation
        run: |
          uv venv --python ${{ matrix.python-version }} test-env-sdist
          uv pip install --python test-env-sdist/bin/python dist/*.tar.gz
          test-env-sdist/bin/python -c "import faker_jsonschema; print('Sdist installation OK')"

      - name: Check py.typed marker in wheel
        run: |
          unzip -l dist/*.whl | grep "faker_jsonschema/py.typed" || (echo "ERROR: py.typed marker missing" && exit 1)

  publish:
    name: Publish to PyPI
    needs: [quality, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: pypi
      url: https://pypi.org/p/faker-jsonschema
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: [publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
